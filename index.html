<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!--Custom CSS-->
    <link rel="stylesheet" href="style.css">
    <!--JavaScript-->
    <script src="script.js" defer></script>   
</head>
<body> 
    <section>
    <div class="form-container">
        <h2>Registration Form</h2>
        <form id="registerForm">
            <!-- Form fields will be added here -->
             <div class="form-group">
                <label for="name"><span class="required">*</span> Name:</label>
                <div class="input-box">
                        <i class="fa fa-user" id="nameIcon"></i>

                <input type="text" id="name" name="name" required>
                </div>
                <span id="nameError" class="error-message">Name is required</span>
            </div>
            <div class="form-group">
                <label for="email"><span class="required">*</span> Email:</label>
                <div class="input-box">
                                <i class="fa fa-envelope" id="emailIcon"></i>

                <input type="email" id="email" name="email" required>
                </div>
                <span id="emailError" class="error-message">Please enter a valid email</span>
            </div>
            <div class="form-group">
                <label for="password"><span class="required">*</span> Password:</label>
                <div class="input-box">
                <i class="fa fa-lock" id="passwordIcon"></i>
                <input type="password" id="password" name="password" required>
                </div>
                <span id="passwordError" class="error-message">Password must be at least 6 characters</span>
            </div>
            <button type="submit" id="submitBtn" disabled>Submit</button>
        </form>
        <p id="successMessage" style="display:none; color:green; text-align:center; margin-top:15px; font-weight:bold;">
    ✅ Form submitted successfully!<br>
    <a href="index.html" id="resetLink" style="color:blue; text-decoration:none; margin-left:10px;">Back</a>
</p>
    </div>
   </section> 
</body>
</html>
